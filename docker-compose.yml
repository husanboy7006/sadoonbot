version: '3.8'

services:
  # 1-Qism: Asosiy API (Backend dvigatel)
  api:
    build: .
    container_name: instamixer_api
    ports:
      - "8008:8000"
    # Docker ichida serverni hamma tarafdan ko'rinadigan qilib (0.0.0.0) yoqamiz
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app # Siz o'zgartirish kiritsangiz Docker ichida ham avtomat o'zgaradi

  # 2-Qism: Telegram Bot
  bot:
    build: .
    container_name: instamixer_bot
    command: python bot.py
    volumes:
      - .:/app
    depends_on:
      - api # Bot API yoqilmaguncha ishlamay turadi
    environment:
      # Bot API ga murojaat qilganda kompyuterni emas, konteyner nomini izlashi kerak
      - API_URL=http://api:8000/api/mix
