<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadoon - All-in-One Media Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-magic"></i>
                <h1>SADOON <span>PRO</span></h1>
            </div>
            <p class="subtitle">Video Creation • Music Discovery • Fast Download</p>
        </header>

        <!-- Tablar menyusi -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="mix"><i class="fas fa-film"></i> Mix</button>
            <button class="tab-btn" data-tab="shazam"><i class="fas fa-search"></i> Shazam</button>
            <button class="tab-btn" data-tab="down"><i class="fas fa-download"></i> Downloader</button>
        </div>

        <main class="card">
            <!-- 1. Mix Bo'limi -->
            <div id="mixTab" class="tab-content active">
                <div class="input-group">
                    <label for="imageInput" class="upload-label">
                        <i class="fas fa-image"></i>
                        <span>Rasm tanlang</span>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" hidden>
                </div>
                <div class="input-group">
                    <input type="text" id="mixUrl" placeholder="Instagram Reels linkini kiriting...">
                </div>
                <button id="mixBtn" class="primary-btn">Video yasash</button>
            </div>

            <!-- 2. Shazam Bo'limi -->
            <div id="shazamTab" class="tab-content">
                <div class="input-group">
                    <label for="shazamFile" class="upload-label">
                        <i class="fas fa-music"></i>
                        <span>Audio/Video fayl tanlang</span>
                    </label>
                    <input type="file" id="shazamFile" accept="audio/*,video/*" hidden>
                </div>
                <p class="or-text">yoki</p>
                <div class="input-group">
                    <input type="text" id="shazamUrl" placeholder="Instagram linkini kiriting...">
                </div>
                <button id="shazamBtn" class="primary-btn shazam-color">Musiqani topish</button>
            </div>

            <!-- 3. Downloader Bo'limi -->
            <div id="downTab" class="tab-content">
                <div class="input-group">
                    <input type="text" id="downUrl" placeholder="Video havolasini (Link) kiritish...">
                </div>
                <button id="downBtn" class="primary-btn down-color">Videoni yuklash</button>
            </div>

            <!-- Loader va Natija Area -->
            <div class="loader-container" id="loader">
                <div class="loader-circle"></div>
                <p>Jarayon ketmoqda, iltimos kuting...</p>
            </div>

            <div id="resultArea" class="result-area hidden">
                <div id="videoResult" class="hidden">
                    <h3>Tayyor! 🎉</h3>
                    <video id="outputVideo" controls></video>
                    <a id="downloadBtn" class="download-link" href="#" download>Yuklab olish</a>
                </div>
                <div id="shazamResult" class="hidden">
                    <div class="track-card">
                        <img id="trackImg" src="" alt="Cover">
                        <div class="track-info">
                            <h2 id="trackTitle"></h2>
                            <p id="trackArtist"></p>
                            <a id="shazamLink" href="#" target="_blank">Shazamda ko'rish</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Sadoon media platform <BR> <a href="https://t.me/sadoon_ai_bot" target="_blank">@sadoon_ai_bot</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
