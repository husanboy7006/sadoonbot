<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadoon - Media Dvigatelingiz</title>
    <meta name="description" content="Instagram audiosi bilan rasmizni sifatli musiqali videoga aylantiring, va ko'plab audio funksiyalar!">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    <div class="container glass-panel">
        <header>
            <h1>Sado<span class="highlight">on</span></h1>
            <p>Rasmingiz va sevimli audioingiz bitta videoda!</p>
        </header>

        <form id="mix-form">
            <div class="form-group mb">
                <label for="image-upload" class="upload-box glass-card" id="drop-zone">
                    <div class="upload-content" id="upload-content">
                        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <p class="upload-title">Rasmni yuklang</p>
                        <p class="upload-desc">yoki ustiga tashlang</p>
                    </div>
                    <img id="image-preview" src="" alt="Preview" style="display: none;">
                    <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" required hidden>
                </label>
            </div>

            <div class="form-group mb">
                <label for="insta-url" class="input-label">Instagram yoki Audio Havolasi:</label>
                <div class="input-wrapper">
                    <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <input type="url" id="insta-url" class="glass-input" placeholder="https://www.instagram.com/reel/..." required>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary">
                <span id="btn-text">Videoni Yaratish <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></span>
                <span class="loader" id="loader" style="display: none;"></span>
            </button>
        </form>

        <div id="result-box" class="result-box hidden">
            <h3>🎉 Tayyor! Olingiz:</h3>
            <video id="result-video" class="glass-card" controls playsinline></video>
            <a id="download-btn" class="btn-secondary" download>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Saqlab olish
            </a>
        </div>
        
        <div id="error-box" class="error-box hidden">
            <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <p id="error-text">Nimadir xato ketdi...</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
